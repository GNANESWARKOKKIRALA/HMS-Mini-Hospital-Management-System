{% extends 'base.html' %}
{% block title %}Login — HMS{% endblock %}
{% block content %}
<div style="max-width:420px;margin:0 auto;">
    <div class="card">
        <h2>🏥 Sign In</h2>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                {{ field.label_tag }}
                {{ field }}
                {{ field.errors }}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Login</button>
        </form>
        <p style="margin-top:20px;text-align:center;font-size:0.9rem;color:#718096;">
            Doctor? <a href="{% url 'doctor_signup' %}">Sign up</a> &nbsp;|&nbsp;
            Patient? <a href="{% url 'patient_signup' %}">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}

service: hms-email-service

frameworkVersion: '3'

provider:
  name: aws
  runtime: python3.11
  region: us-east-1
  # Actual AWS deployment is optional — use serverless-offline for local testing

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3000
    host: 0.0.0.0

functions:
  sendEmail:
    handler: handler.send
    events:
      - http:
          path: /email/send
          method: post
          cors: true
    environment:
      SMTP_HOST: ${env:SMTP_HOST, 'smtp.gmail.com'}
      SMTP_PORT: ${env:SMTP_PORT, '587'}
      SMTP_USER: ${env:SMTP_USER, ''}
      SMTP_PASSWORD: ${env:SMTP_PASSWORD, ''}
      FROM_EMAIL: ${env:FROM_EMAIL, ''}
      FROM_NAME: ${env:FROM_NAME, 'HMS Hospital System'}
